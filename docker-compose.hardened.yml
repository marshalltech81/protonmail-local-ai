# =============================================================================
# Hardened network overlay — optional, local-only mode
# =============================================================================
# Marks app-net as internal so indexer and mcp-server cannot reach the
# public internet, limiting exfiltration surface if a container is
# compromised.
#
# !!! Compatible only with fully-local providers !!!
#
# Whether the indexer + mcp-server can still reach the embedder, the
# inference endpoint, and the optional reranker depends on where they
# are configured to run:
#
#   - Host-side endpoint via ``host.docker.internal`` — reachability
#     under ``internal: true`` is runtime-dependent. On Docker Desktop
#     the host alias may still resolve through the bridge IP; on
#     OrbStack the behavior is not currently verified and should be
#     assumed broken until tested. Until this is verified end-to-end,
#     treat the overlay as broken when host-side endpoints are in use.
#   - Containerized OpenAI-compatible / rerank service on app-net —
#     reachable as expected.
#   - Any remote provider (Anthropic, DeepInfra, OpenRouter, Cohere,
#     etc.) — blocked by design. INFERENCE_MODE=anthropic, any
#     cloud-pointed EMBED_BASE_URL, and RERANK_MODE=cohere will fail
#     under this overlay, which is the point.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hardened.yml up -d
#
# To revert:
#   docker compose down
#   docker compose up -d   # base config, internet access restored
# =============================================================================

networks:
  app-net:
    driver: bridge
    internal: true
