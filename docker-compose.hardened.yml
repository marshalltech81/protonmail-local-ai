# =============================================================================
# Hardened network overlay — optional, local-only mode
# =============================================================================
# Marks app-net as internal so indexer and mcp-server cannot reach the
# public internet, limiting exfiltration surface if a container is
# compromised.
#
# !!! INCOMPATIBLE with host model services as currently wired !!!
#
# The indexer + mcp-server reach the host MLX servers
# (``host.docker.internal:8001`` for mlx-service, and
# ``host.docker.internal:8002`` for mlx-lm-server when
# ``LLM_MODE=local``). Whether ``host.docker.internal`` is reachable
# from a network with ``internal: true`` depends on the runtime:
# in some Docker Desktop configurations the host alias still resolves
# through the bridge IP, but on OrbStack the behavior is not currently
# verified and the overlay should be assumed broken until tested.
#
# Until this overlay is reworked to either (a) move both MLX services
# into containers on app-net, or (b) explicitly punch
# host.docker.internal through, treat it as **broken in the default
# stack**. It will likely cut off:
#
#   - local LLM calls (LLM_MODE=local) reaching ``LLM_BASE_URL`` on the
#     host
#   - mlx-service /embed and /rerank calls
#   - LLM_MODE=cloud Anthropic API calls (the only intended block)
#
# Prerequisites (if you fix the host-alias question and want to use it):
#   - Use LLM_MODE=local only — cloud calls will fail under this overlay
#
# Usage (post-fix):
#   docker compose -f docker-compose.yml -f docker-compose.hardened.yml up -d
#
# To revert:
#   docker compose down
#   docker compose up -d   # base config, internet access restored
# =============================================================================

networks:
  app-net:
    driver: bridge
    internal: true
