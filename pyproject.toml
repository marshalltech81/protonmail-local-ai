[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes — undefined names, unused imports
    "I",   # isort — import ordering
    "UP",  # pyupgrade — modernize syntax
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
# Tool registration functions use broad except for user-facing error handling
"mcp-server/src/tools/*.py" = ["F841"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["indexer/tests", "mcp-server/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
# asyncio_mode = "auto" — uncomment when pytest-asyncio is added to requirements
