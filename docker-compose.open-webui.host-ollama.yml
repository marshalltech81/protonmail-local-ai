# =============================================================================
# Open WebUI host-Ollama overlay
# Companion to docker-compose.host-ollama.yml: when Ollama is running
# natively on the macOS host, point Open WebUI at host.docker.internal
# instead of the (now-absent) ollama container.
#
# Apply order matters — load with all three files in this sequence:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.host-ollama.yml \
#     -f docker-compose.open-webui.yml \
#     -f docker-compose.open-webui.host-ollama.yml \
#     up -d open-webui
# Or via: make open-webui-up-host-ollama
# =============================================================================

services:

  open-webui:
    depends_on:
      ollama: !reset null
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
