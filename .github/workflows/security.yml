name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "**/pyproject.toml"
      - "**/uv.lock"
      - "**/Dockerfile"
      - "indexer/src/**"
      - "mcp-server/src/**"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/pyproject.toml"
      - "**/uv.lock"
      - "**/Dockerfile"
      - "indexer/src/**"
      - "mcp-server/src/**"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-deps:
    name: Trivy dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Scan indexer dependencies
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: indexer
          scanners: vuln
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan mcp-server dependencies
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: mcp-server
          scanners: vuln
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  bandit:
    name: Bandit static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install Bandit
        run: python -m pip install "bandit==1.9.4"

      - name: Scan indexer source
        run: bandit -r indexer/src -ll

      - name: Scan mcp-server source
        run: bandit -r mcp-server/src -ll

  trivy-misconfig:
    name: Trivy misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Scan repository configuration
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          skip-dirs: .git,.ruff_cache,.pytest_cache,.venv,indexer/.venv,mcp-server/.venv
