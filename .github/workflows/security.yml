name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "**/requirements.txt"
      - "**/Dockerfile"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/requirements.txt"
      - "**/Dockerfile"
      - ".github/workflows/security.yml"
  schedule:
    # Every Sunday at 08:00 UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-deps:
    name: Trivy dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.68.2
          cache: true

      - name: Scan indexer dependencies
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: indexer/requirements.txt
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan mcp-server dependencies
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: mcp-server/requirements.txt
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  trivy-misconfig:
    name: Trivy misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.68.2
          cache: true

      - name: Scan repository configuration
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          skip-setup-trivy: true
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          skip-dirs: .git,.ruff_cache,.pytest_cache,.venv,indexer/.venv
