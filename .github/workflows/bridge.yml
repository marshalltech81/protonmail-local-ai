name: Bridge

on:
  push:
    branches: [main]
    paths:
      - "bridge/**"
      - "mbsync/**"
      - "docker-compose.yml"
      - ".env.example"
      - "Makefile"
      - "scripts/bridge-*.sh"
      - ".github/workflows/bridge.yml"
  pull_request:
    branches: [main]
    paths:
      - "bridge/**"
      - "mbsync/**"
      - "docker-compose.yml"
      - ".env.example"
      - "Makefile"
      - "scripts/bridge-*.sh"
      - ".github/workflows/bridge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Runs `make bridge-upgrade-check` in two parallel stages: patch-drift first
  # (fast failure on upstream source divergence) and the build/runtime smoke
  # only after drift passes. `make bridge-upgrade-check` = bridge-patch-check
  # + bridge-smoke, so these jobs together implement the same gate documented
  # for local Bridge version bumps.
  bridge-patch-drift:
    name: Bridge patch drift (make bridge-patch-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # The drift check compiles internal/vault, which transitively imports
      # docker-credential-helpers/secretservice and needs libsecret-1-dev via
      # pkg-config. The runner ships with Go on PATH so the script's "host
      # Go" path is taken; install the same C deps Bridge's Dockerfile
      # builder stage uses so the host compile matches the build.
      - name: Install Bridge build C dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libsecret-1-dev libfido2-dev libcbor-dev

      - name: Verify Bridge source patch points
        run: make bridge-patch-check

  bridge-smoke:
    name: Bridge smoke test (make bridge-smoke)
    runs-on: ubuntu-latest
    needs: bridge-patch-drift
    timeout-minutes: 45
    permissions:
      contents: read
      # Required for SLSA provenance attestation signing via OIDC.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Seed local config for compose build
        run: |
          cp .env.example .env
          mkdir -p .secrets
          printf 'placeholder-bridge-pass' > .secrets/bridge_pass.txt
          chmod 600 .secrets/bridge_pass.txt
          printf '' > .secrets/anthropic_api_key.txt
          chmod 600 .secrets/anthropic_api_key.txt

      - name: Build and smoke test Bridge
        run: make bridge-smoke

      - name: Extract Bridge binary for attestation
        run: |
          docker create --name bridge-tmp protonmail-local-ai/bridge
          docker cp bridge-tmp:/usr/local/bin/bridge ./bridge-binary
          docker rm bridge-tmp

      - name: Attest Bridge binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ./bridge-binary
