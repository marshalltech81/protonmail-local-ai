name: Bridge

on:
  push:
    branches: [main]
    paths:
      - "bridge/**"
      - "mbsync/**"
      - "docker-compose.yml"
      - ".env.example"
      - "Makefile"
      - "scripts/bridge-*.sh"
      - ".github/workflows/bridge.yml"
  pull_request:
    branches: [main]
    paths:
      - "bridge/**"
      - "mbsync/**"
      - "docker-compose.yml"
      - ".env.example"
      - "Makefile"
      - "scripts/bridge-*.sh"
      - ".github/workflows/bridge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge-patch-drift:
    name: Bridge patch drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify Bridge source patch points
        run: ./scripts/bridge-patch-drift.sh

  bridge-smoke:
    name: Bridge smoke test
    runs-on: ubuntu-latest
    needs: bridge-patch-drift
    steps:
      - uses: actions/checkout@v6

      - name: Seed local config for compose build
        run: |
          cp .env.example .env
          mkdir -p .secrets
          printf 'placeholder-bridge-pass' > .secrets/bridge_pass.txt
          chmod 600 .secrets/bridge_pass.txt

      - name: Build and smoke test Bridge
        run: ./scripts/bridge-smoke.sh
