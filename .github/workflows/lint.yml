name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@2.0.0

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
          ignore: DL3008,DL3059

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  compileall:
    name: compileall
    runs-on: ubuntu-latest
    # Belt-and-braces around ruff: exercises the full Python import-time
    # path (__init__.py, relative imports, from-imports) which ruff's
    # parser doesn't fully simulate. Catches broken imports or accidental
    # use of a symbol that ruff's static check lets through.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Compile indexer sources
        run: python -m compileall -q -f indexer/src

      - name: Compile mcp-server sources
        run: python -m compileall -q -f mcp-server/src

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.6"
          enable-cache: true
          cache-dependency-glob: |
            indexer/uv.lock
            mcp-server/uv.lock

      - name: Typecheck indexer
        working-directory: indexer
        run: uv run mypy src

      - name: Typecheck mcp-server
        working-directory: mcp-server
        run: uv run mypy src
