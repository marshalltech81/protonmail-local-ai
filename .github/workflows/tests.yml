name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  indexer-pytest:
    name: indexer pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.6"
          enable-cache: true
          cache-dependency-glob: "indexer/uv.lock"

      - name: Sync indexer environment
        working-directory: indexer
        run: uv sync --locked --dev

      - name: Run pytest
        working-directory: indexer
        run: uv run pytest -q
