name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  indexer-pytest:
    name: indexer pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.6"
          enable-cache: true
          cache-dependency-glob: "indexer/uv.lock"

      - name: Sync indexer environment
        working-directory: indexer
        run: uv sync --locked --dev

      - name: Run pytest with coverage
        working-directory: indexer
        run: uv run pytest -q --cov-report=xml:coverage.xml --cov-report=term

      - name: Upload indexer coverage report
        uses: actions/upload-artifact@v4
        with:
          name: indexer-coverage
          path: indexer/coverage.xml
          if-no-files-found: error
          retention-days: 14

  mcp-server-pytest:
    name: mcp-server pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.6"
          enable-cache: true
          cache-dependency-glob: "mcp-server/uv.lock"

      - name: Sync mcp-server environment
        working-directory: mcp-server
        run: uv sync --locked --dev

      - name: Run pytest with coverage
        working-directory: mcp-server
        run: uv run pytest -q --cov-report=xml:coverage.xml --cov-report=term

      - name: Upload mcp-server coverage report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-coverage
          path: mcp-server/coverage.xml
          if-no-files-found: error
          retention-days: 14
