name: Links

on:
  push:
    branches: [main]
    paths:
      - "*.md"
      - ".github/**/*.md"
      - ".github/**/*.yml"
      - "docs/**/*.md"
      - "docs/**/*.json"
      - "lychee.toml"
  pull_request:
    branches: [main]
    paths:
      - "*.md"
      - ".github/**/*.md"
      - ".github/**/*.yml"
      - "docs/**/*.md"
      - "docs/**/*.json"
      - "lychee.toml"
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check repository links
        uses: lycheeverse/lychee-action@v2.7.0
        with:
          args: >-
            --config ./lychee.toml
            README.md AGENTS.md PLAN.md CLAUDE.md CONTRIBUTING.md SECURITY.md
            docs/**/*.md docs/**/*.json
            .github/**/*.md .github/**/*.yml
