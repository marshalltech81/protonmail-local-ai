name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Seed local config for compose validation
        run: |
          cp .env.example .env
          make init-secrets
          printf 'placeholder-bridge-pass' > .secrets/bridge_pass.txt

      - name: Validate docker compose configuration
        run: docker compose config --quiet

  build-images:
    name: docker compose build
    runs-on: ubuntu-latest
    needs: compose-config
    steps:
      - uses: actions/checkout@v6

      - name: Seed local config for image build
        run: |
          cp .env.example .env
          make init-secrets
          printf 'placeholder-bridge-pass' > .secrets/bridge_pass.txt

      - name: Build local images
        run: docker compose build protonmail-bridge mbsync indexer mcp-server
