version: 2

updates:
  # Repo-level tooling
  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, pre-commit]

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  # indexer Python dependencies
  - package-ecosystem: uv
    directory: /indexer
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, python]

  # mcp-server Python dependencies
  - package-ecosystem: uv
    directory: /mcp-server
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, python]

  # Docker base images
  - package-ecosystem: docker
    directory: /bridge
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /mbsync
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /indexer
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /mcp-server
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]
