services:

  # ---------------------------------------------------------------------------
  # ProtonBridge
  # Decrypts ProtonMail and exposes IMAP/SMTP on the internal network.
  # Build from official Proton source using the no-GUI target.
  # First run requires interactive login: make first-run
  # ---------------------------------------------------------------------------
  protonmail-bridge:
    build:
      context: ./bridge
      args:
        BRIDGE_VERSION: ${BRIDGE_VERSION:-v3.24.1}
    image: protonmail-local-ai/bridge
    container_name: protonmail-bridge
    restart: unless-stopped
    stop_grace_period: 30s
    # Run tini (Docker's built-in init) as PID 1 so signals are forwarded
    # to the bridge binary on `docker stop` and any orphaned child
    # processes are reaped instead of accumulating as zombies.
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp
      # The read-only rootfs makes /home/bridge ephemeral too; set ownership
      # here so the non-root bridge user can still write to its runtime home.
      - /home/bridge:uid=1000,gid=1000,mode=700
    volumes:
      - bridge-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bridge-net
    healthcheck:
      test: ["CMD", "bash", "-c", ": > /dev/tcp/localhost/1143"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # mbsync
  # Syncs email from Bridge IMAP to local Maildir in real time.
  # ---------------------------------------------------------------------------
  mbsync:
    build:
      context: ./mbsync
    secrets:
      - bridge_pass
    container_name: mbsync
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    tmpfs:
      - /tmp
    depends_on:
      protonmail-bridge:
        condition: service_healthy
    environment:
      BRIDGE_HOST: protonmail-bridge
      BRIDGE_IMAP_PORT: 1143
      BRIDGE_USER: ${BRIDGE_USER}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-60}
      # Set to true once, for a single restart, when Bridge's TLS cert is
      # deliberately rotated (e.g. Bridge version upgrade). mbsync refuses
      # to sync on a fingerprint mismatch otherwise.
      BRIDGE_CERT_PIN_ROTATE: ${BRIDGE_CERT_PIN_ROTATE:-false}
    volumes:
      - maildir-volume:/maildir
      - mbsync-state:/state
    networks:
      - bridge-net

  # ---------------------------------------------------------------------------
  # Ollama
  # Serves local embedding and LLM models.
  # GPU passthrough: uncomment the deploy block below if you have NVIDIA GPU.
  #
  # Memory planning: Ollama loads the full embedding + LLM weights into RAM
  # on first use. Rough per-model footprint (model weights + ~20% runtime):
  #   - nomic-embed-text         ~0.5 GB  (embedding, always loaded)
  #   - llama3.2:3b              ~3 GB
  #   - llama3.1:8b              ~6 GB
  #   - qwen2.5:14b / mixtral    ~10 GB+
  # Budget host RAM for the embedding model plus whichever LLM you pull, and
  # add ~2 GB headroom so the kernel can keep a page cache. If the host is
  # memory-tight, add a hard ceiling with `mem_limit` (e.g. `mem_limit: 6g`)
  # — Ollama will error cleanly rather than triggering the OOM killer on
  # another service.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.21.0
    container_name: ollama
    restart: unless-stopped
    init: true
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - app-net
    # Uncomment and tune based on your model and host budget:
    # mem_limit: 6g
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Indexer
  # Watches Maildir, parses and threads emails, generates embeddings,
  # and writes to the SQLite index (FTS5 + sqlite-vec).
  # ---------------------------------------------------------------------------
  indexer:
    build:
      context: ./indexer
    container_name: indexer
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    tmpfs:
      - /tmp
      - /home/indexer:uid=1002,gid=1002,mode=700
    depends_on:
      ollama:
        condition: service_healthy
      mbsync:
        condition: service_healthy
    environment:
      HOME: /home/indexer
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      MAILDIR_PATH: /maildir
      SQLITE_PATH: /data/mail.db
      # Deletion reconciliation — opt-in. See .env.example for details.
      INDEXER_DELETION_ENABLED: ${INDEXER_DELETION_ENABLED:-false}
      INDEXER_DELETION_GRACE_DAYS: ${INDEXER_DELETION_GRACE_DAYS:-7}
      INDEXER_DELETION_SWEEP_INTERVAL_SECS: ${INDEXER_DELETION_SWEEP_INTERVAL_SECS:-3600}
      INDEXER_DELETION_MAX_BATCH_PCT: ${INDEXER_DELETION_MAX_BATCH_PCT:-0.05}
      INDEXER_DELETION_FORCE: ${INDEXER_DELETION_FORCE:-false}
      INDEXER_UNLINK_ON_REAP: ${INDEXER_UNLINK_ON_REAP:-false}
    volumes:
      # Maildir is mounted read-only by default: the indexer's job is to read
      # .eml files and build the SQLite index. INDEXER_UNLINK_ON_REAP needs
      # write access to actually remove reaped files; with the default ro
      # mount the unlink call logs a warning and the index still cleans up
      # correctly, the files just stay on disk.
      - maildir-volume:/maildir:ro
      - sqlite-volume:/data
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # MCP Server
  # Exposes search, Q&A, and agentic tools to Claude Desktop via HTTP/SSE.
  # Accessible at http://localhost:MCP_PORT/mcp on the host machine only.
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp-server
    container_name: mcp-server
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    tmpfs:
      - /tmp
    depends_on:
      indexer:
        condition: service_healthy
      ollama:
        condition: service_healthy
    secrets:
      - anthropic_api_key
    environment:
      SQLITE_PATH: /data/mail.db
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.2}
      LLM_MODE: ${LLM_MODE:-local}
      MCP_PORT: ${MCP_PORT:-3000}
      MCP_READ_ONLY: ${MCP_READ_ONLY:-true}
    volumes:
      # Mounted writable so SQLite can create the WAL ``-shm`` sidecar needed
      # for readers on a WAL-mode database. The mcp-server process opens the
      # DB via the ``?mode=ro`` URI and enforces ``PRAGMA query_only`` so the
      # connection cannot mutate the index — a writable mount plus an
      # application-level read-only connection preserves read-only semantics
      # without blocking WAL reads.
      - sqlite-volume:/data
    ports:
      - "127.0.0.1:${MCP_PORT:-3000}:3000"
    networks:
      - app-net
    # Healthcheck is defined in mcp-server/Dockerfile and inherited here.

# =============================================================================
# Volumes
# All email data and indexes live in named Docker volumes.
# Back up sqlite-volume to preserve your search index.
# =============================================================================
volumes:
  bridge-data:       # Bridge credentials, config, and cache
  maildir-volume:    # Raw email in Maildir format
  mbsync-state:      # Persistent mbsync state (pinned Bridge cert fingerprint)
  ollama-models:     # Downloaded Ollama models
  sqlite-volume:     # SQLite database (FTS5 + vector index)

# =============================================================================
# Networks
# Bridge-facing traffic is isolated from the application network.
# Only the MCP server port is exposed to the host (localhost only).
# =============================================================================
networks:
  bridge-net:
    driver: bridge
  app-net:
    driver: bridge

secrets:
  bridge_pass:
    file: ./.secrets/bridge_pass.txt
  # Claude API key — required when LLM_MODE=cloud.
  # For local-only mode, leave the file empty: printf '' > .secrets/anthropic_api_key.txt
  # Never put this value in .env — it will appear in docker inspect output.
  anthropic_api_key:
    file: ./.secrets/anthropic_api_key.txt
