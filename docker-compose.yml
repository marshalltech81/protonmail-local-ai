services:

  # ---------------------------------------------------------------------------
  # ProtonBridge
  # Decrypts ProtonMail and exposes IMAP/SMTP on the internal network.
  # Build from official Proton source using the no-GUI target.
  # First run requires interactive login: make first-run
  # ---------------------------------------------------------------------------
  protonmail-bridge:
    build:
      context: ./bridge
      args:
        BRIDGE_VERSION: ${BRIDGE_VERSION:-v3.24.1}
    image: protonmail-local-ai/bridge
    container_name: protonmail-bridge
    restart: unless-stopped
    stop_grace_period: 30s
    # Run tini (Docker's built-in init) as PID 1 so signals are forwarded
    # to the bridge binary on `docker stop` and any orphaned child
    # processes are reaped instead of accumulating as zombies.
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp
      # The read-only rootfs makes /home/bridge ephemeral too; set ownership
      # here so the non-root bridge user can still write to its runtime home.
      - /home/bridge:uid=1000,gid=1000,mode=700
    volumes:
      - bridge-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bridge-net
    healthcheck:
      test: ["CMD", "bash", "-c", ": > /dev/tcp/localhost/1143"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # mbsync
  # Syncs email from Bridge IMAP to local Maildir in real time.
  # ---------------------------------------------------------------------------
  mbsync:
    build:
      context: ./mbsync
    secrets:
      - bridge_pass
    container_name: mbsync
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    tmpfs:
      - /tmp
    depends_on:
      protonmail-bridge:
        condition: service_healthy
    environment:
      BRIDGE_HOST: protonmail-bridge
      BRIDGE_IMAP_PORT: 1143
      BRIDGE_USER: ${BRIDGE_USER}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-60}
      # Set to true once, for a single restart, when Bridge's TLS cert is
      # deliberately rotated (e.g. Bridge version upgrade). mbsync refuses
      # to sync on a fingerprint mismatch otherwise.
      BRIDGE_CERT_PIN_ROTATE: ${BRIDGE_CERT_PIN_ROTATE:-false}
    volumes:
      - maildir-volume:/maildir
      - mbsync-state:/state
    networks:
      - bridge-net

  # ---------------------------------------------------------------------------
  # Note: Ollama is no longer an in-stack container. Containers reach a
  # host-installed Ollama via OrbStack's ``host.docker.internal:11434``
  # (default) for any code path that still routes there
  # (``USE_MLX_EMBEDDER=false`` fallback; ``LLM_MODE=local``). The host
  # bind + macOS Application Firewall + LaunchAgent setup lives in
  # ``docs/setup.md`` (the section that used to be marked "Optional:
  # native (host) Ollama on macOS"). Override ``OLLAMA_HOST`` in ``.env``
  # if you serve Ollama from somewhere other than the host.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Indexer
  # Watches Maildir, parses and threads emails, generates embeddings,
  # and writes to the SQLite index (FTS5 + sqlite-vec).
  # ---------------------------------------------------------------------------
  indexer:
    build:
      context: ./indexer
    container_name: indexer
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    # Cap memory so a malicious attachment that slips past the
    # ``ZIP_MAX_UNCOMPRESSED_BYTES`` pre-check (e.g. a quadratic-blowup
    # XML payload that lxml expands in core) cannot pressure the host.
    # Peak memory scales with ``concurrency × largest_in_flight_message``
    # because parsed attachment text and per-chunk float vectors are
    # held in memory while waiting on Ollama embed RPCs. Empirical
    # tuning history (May 2026 eval session, ~22k-message mailbox with
    # attachment-heavy threads):
    #
    #   - 1 GiB was too tight under normal indexing bursts.
    #   - 2 GiB OOM-killed 3 times during initial backfill.
    #   - 4 GiB OOM-killed 1 more time during the same backfill.
    #   - 6 GiB is the post-incident cap. Steady-state RSS will be
    #     much lower; this is sized for the backfill peak. The right
    #     long-term fix is throttling the indexer's parallel embed
    #     dispatch (peak memory scales with concurrency, not with the
    #     mailbox size) — see the eval recommendations for details.
    mem_limit: 6g
    tmpfs:
      - /tmp
      - /home/indexer:uid=1002,gid=1002,mode=700
    depends_on:
      mbsync:
        condition: service_healthy
    environment:
      HOME: /home/indexer
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      MAILDIR_PATH: /maildir
      SQLITE_PATH: /data/mail.db
      # MLX retrieval stack — see .env.example for the full explanation.
      # Default routes embed calls to the host-side mlx-service over
      # OrbStack's host.docker.internal shortcut. Set USE_MLX_EMBEDDER=false
      # to fall back to the Ollama embed path above (only valid if the
      # schema is also reverted to 768-dim — see migration 0014).
      USE_MLX_EMBEDDER: ${USE_MLX_EMBEDDER:-true}
      MLX_SERVICE_URL: ${MLX_SERVICE_URL:-http://host.docker.internal:8001}
      # Warmup POST timeout for the first embed call after container
      # start. Default 600s in code accounts for first-time HF model
      # downloads (~4 min embedder + ~2 min reranker). Lower it on a
      # warm cache for faster startup-failure detection.
      MLX_EMBED_WARMUP_TIMEOUT_SECS: ${MLX_EMBED_WARMUP_TIMEOUT_SECS:-600}
      # Confirmation gate for the v13→v14 destructive migration.
      # Default false so a routine container restart on a populated v13
      # install fails fast with an instructive error instead of
      # silently kicking off a multi-hour rebuild. See .env.example.
      INDEXER_MIGRATION_V14_FORCE: ${INDEXER_MIGRATION_V14_FORCE:-false}
      # Chunker token budgets. Defaults are sized for Qwen3-Embedding-8B
      # (long-context); operators on the legacy Ollama path should
      # override these back to 350 / 500 / 60.
      INDEXER_CHUNK_TARGET_TOKENS: ${INDEXER_CHUNK_TARGET_TOKENS:-1000}
      INDEXER_CHUNK_MAX_TOKENS: ${INDEXER_CHUNK_MAX_TOKENS:-1500}
      INDEXER_CHUNK_OVERLAP_TOKENS: ${INDEXER_CHUNK_OVERLAP_TOKENS:-150}
      # Deletion reconciliation — opt-in. See .env.example for details.
      INDEXER_DELETION_ENABLED: ${INDEXER_DELETION_ENABLED:-false}
      INDEXER_DELETION_GRACE_DAYS: ${INDEXER_DELETION_GRACE_DAYS:-7}
      INDEXER_DELETION_SWEEP_INTERVAL_SECS: ${INDEXER_DELETION_SWEEP_INTERVAL_SECS:-3600}
      INDEXER_DELETION_MAX_BATCH_PCT: ${INDEXER_DELETION_MAX_BATCH_PCT:-0.05}
      INDEXER_DELETION_FORCE: ${INDEXER_DELETION_FORCE:-false}
      INDEXER_UNLINK_ON_REAP: ${INDEXER_UNLINK_ON_REAP:-false}
      # Attachment extraction knobs. Code defaults already match these
      # values; explicit wiring is here so operator overrides in .env
      # actually reach the container env (otherwise compose interpolates
      # them only into its own substitution scope, never into os.environ
      # inside the indexer process).
      INDEXER_ATTACHMENT_EXTRACTION_ENABLED: ${INDEXER_ATTACHMENT_EXTRACTION_ENABLED:-true}
      INDEXER_OCR_ENABLED: ${INDEXER_OCR_ENABLED:-true}
      INDEXER_ATTACHMENT_MAX_BYTES: ${INDEXER_ATTACHMENT_MAX_BYTES:-10000000}
      INDEXER_OCR_MAX_PAGES: ${INDEXER_OCR_MAX_PAGES:-20}
      INDEXER_OCR_TIMEOUT_SECONDS: ${INDEXER_OCR_TIMEOUT_SECONDS:-60}
      INDEXER_PDF_MAX_DIGITAL_PAGES: ${INDEXER_PDF_MAX_DIGITAL_PAGES:-500}
      INDEXER_ATTACHMENT_MAX_EXTRACTED_CHARS: ${INDEXER_ATTACHMENT_MAX_EXTRACTED_CHARS:-2000000}
    volumes:
      # Maildir is mounted read-only by default: the indexer's job is to read
      # .eml files and build the SQLite index. INDEXER_UNLINK_ON_REAP needs
      # write access to actually remove reaped files; with the default ro
      # mount the unlink call logs a warning and the index still cleans up
      # correctly, the files just stay on disk.
      - maildir-volume:/maildir:ro
      - sqlite-volume:/data
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # MCP Server
  # Exposes search, Q&A, and agentic tools over MCP transports.
  # Accessible on the host machine only. Default SSE path:
  # http://localhost:MCP_PORT/sse. Streamable HTTP path when enabled:
  # http://localhost:MCP_PORT/mcp.
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp-server
    container_name: mcp-server
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    tmpfs:
      - /tmp
    depends_on:
      indexer:
        condition: service_healthy
    secrets:
      - anthropic_api_key
    environment:
      SQLITE_PATH: /data/mail.db
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:14b-instruct}
      LLM_MODE: ${LLM_MODE:-local}
      MCP_PORT: ${MCP_PORT:-3000}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-sse}
      MCP_READ_ONLY: ${MCP_READ_ONLY:-true}
      # MLX retrieval stack — embedding + reranking over the host-side
      # mlx-service. See .env.example. RERANK_CANDIDATES governs how
      # many RRF results are fed to the cross-encoder before
      # truncation to the caller's ``limit`` (defaulting to
      # RERANK_TOP_N when the caller doesn't specify).
      USE_MLX_EMBEDDER: ${USE_MLX_EMBEDDER:-true}
      USE_MLX_RERANKER: ${USE_MLX_RERANKER:-true}
      MLX_SERVICE_URL: ${MLX_SERVICE_URL:-http://host.docker.internal:8001}
      RERANK_CANDIDATES: ${RERANK_CANDIDATES:-50}
      RERANK_TOP_N: ${RERANK_TOP_N:-10}
    volumes:
      # Mounted writable so SQLite can create the WAL ``-shm`` sidecar needed
      # for readers on a WAL-mode database. The mcp-server process opens the
      # DB via the ``?mode=ro`` URI and enforces ``PRAGMA query_only`` so the
      # connection cannot mutate the index — a writable mount plus an
      # application-level read-only connection preserves read-only semantics
      # without blocking WAL reads.
      - sqlite-volume:/data
    ports:
      - "127.0.0.1:${MCP_PORT:-3000}:3000"
    networks:
      - app-net
    # Healthcheck is defined in mcp-server/Dockerfile and inherited here.

# =============================================================================
# Volumes
# All email data and indexes live in named Docker volumes.
# Back up sqlite-volume to preserve your search index.
# =============================================================================
volumes:
  bridge-data:       # Bridge credentials, config, and cache
  maildir-volume:    # Raw email in Maildir format
  mbsync-state:      # Persistent mbsync state (pinned Bridge cert fingerprint)
  sqlite-volume:     # SQLite database (FTS5 + vector index)

# =============================================================================
# Networks
# Bridge-facing traffic is isolated from the application network.
# Only the MCP server port is exposed to the host (localhost only).
# =============================================================================
networks:
  bridge-net:
    driver: bridge
  app-net:
    driver: bridge

secrets:
  bridge_pass:
    file: ./.secrets/bridge_pass.txt
  # Claude API key — required when LLM_MODE=cloud.
  # For local-only mode, leave the file empty: printf '' > .secrets/anthropic_api_key.txt
  # Never put this value in .env — it will appear in docker inspect output.
  anthropic_api_key:
    file: ./.secrets/anthropic_api_key.txt
