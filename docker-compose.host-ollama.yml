# =============================================================================
# Host-Ollama overlay
# Removes the in-stack ollama container and points indexer + mcp-server at
# a native macOS Ollama (installed via brew) reachable on the host.
# Apply with: docker compose -f docker-compose.yml -f docker-compose.host-ollama.yml up -d
# Or via:     make up-host-ollama
#
# Why this exists: containerized Ollama on Mac runs inside OrbStack's Linux
# VM and cannot use Apple Metal. Native Ollama uses Metal directly, which is
# typically several times faster for inference and embedding on M-series.
#
# Requires the host to bind 0.0.0.0:11434 (so OrbStack containers can reach
# it via host.docker.internal) AND the macOS Application Firewall to be on
# so the listener is not exposed to the LAN. See docs/setup.md.
# =============================================================================

services:

  # Drop the in-stack ollama service entirely. !reset is the documented
  # Compose merge tag for removing a key set by an earlier file in the
  # -f chain (Compose v2.24+).
  ollama: !reset null

  indexer:
    depends_on:
      ollama: !reset null
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434

  mcp-server:
    depends_on:
      ollama: !reset null
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
